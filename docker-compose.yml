services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arcis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arcis}
      POSTGRES_DB: ${POSTGRES_DB:-arcis}
    ports:
      - "5400:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arcis} -d ${POSTGRES_DB:-arcis}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
