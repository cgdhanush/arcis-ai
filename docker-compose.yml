services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arcis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arcis}
      POSTGRES_DB: ${POSTGRES_DB:-arcis}
    ports:
      - "5400:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arcis} -d ${POSTGRES_DB:-arcis}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://arcis:arcis@db:5400/arcis}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT:-8000}/api/v1
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
